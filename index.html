<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#c8102e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Marco Polo Vietnam Tour"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Marco Polo Vietnam Tour</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const BANKNOTES = [500000,200000,100000,50000,20000,10000,5000,2000,1000];
    const fVND = n => new Intl.NumberFormat("de-DE").format(n) + " ₫";
    const fEUR = n => new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n);
    const r10k = n => Math.ceil(n/10000)*10000;

    function roundNice(n) {
      if (n <= 10000) {
        for (const b of BANKNOTES) { if (n >= b) return Math.ceil(n/b)*b; }
        return Math.ceil(n/1000)*1000;
      }
      return r10k(n);
    }

    function getTips(base) {
      if (!base || base <= 0) return [];
      const s = new Set();
      s.add(roundNice(base));
      s.add(r10k(base * 1.1));
      s.add(r10k(base * 1.15));
      s.add(r10k(base * 1.2));
      const flat = base<50000?5000:base<150000?10000:base<400000?20000:base<1000000?50000:100000;
      s.add(r10k(base + flat));
      const a = [...s].sort((a,b) => a-b);
      while (a.length < 5) a.push(r10k(a[a.length-1]*1.05));
      return a.slice(0,5);
    }

    function getBills(total) {
      let rem = total; const u = [];
      for (const n of BANKNOTES) {
        const c = Math.floor(rem/n);
        if (c > 0) { u.push({n, c}); rem -= c*n; }
      }
      return u;
    }

    const LABELS = [
      {icon:"↗️", label:"Aufrunden",  when:"Straßenessen, Bánh mì-Stand, einfaches Pho-Lokal"},
      {icon:"💬", label:"10 % Tipp",  when:"Lokales Restaurant, Grab-Taxi, einfache Massage"},
      {icon:"🍜", label:"15 % Tipp",  when:"Touristisches Restaurant, Stadtführung, Cyclo-Fahrer"},
      {icon:"⭐", label:"20 % Tipp",  when:"Hotelrestaurant, besonders guter Service, private Tour"},
      {icon:"🤝", label:"Pauschal",   when:"Hotelpersonal (Gepäck/Zimmer), kurze Hilfsleistung, Tuk-Tuk"},
    ];

    const PROGRAM = [
      {
        day: 11, weekday: "Samstag", date: "28.03.2026", city: "Hue",
        meals: ["F"],
        text: "Per Fahrradrikscha erkunden wir hinter den Mauern der Zitadelle die Überreste der Verbotenen Purpurnen Stadt. Beim Kaisergrab Minh Mang schlägt unser Forscherherz höher: Skulpturen, Pflanzen, Holzarbeiten. Nachmittags bleibt Zeit zum Shoppen oder um allein auf Entdeckertour zu gehen."
      },
      {
        day: 12, weekday: "Sonntag", date: "29.03.2026", city: "Hue – Mekongdelta",
        meals: ["F", "A"],
        text: "Transportvielfalt nach Art des Landes: Vormittags Flug nach Saigon, dann per Bus weiter ins Mekongdelta: eine Reise zum Reis, dem Dollarbringer des Landes. Mit dem Holzboot fahren wir zu unserer urigen Lodge am Mekong, wo wir zwei Nächte bleiben."
      },
      {
        day: 13, weekday: "Montag", date: "30.03.2026", city: "Mekongdelta",
        meals: ["F", "A"],
        text: "Frühstück unter Palmen mit starkem Vietnamkaffee! Danach geht's auf Entdeckertrip ins Delta. Per Boot natürlich. Wir winken badenden Kindern zu, gleiten an Bananenstauden und Wasserbüffeln vorbei. Per Fahrrad erkunden wir eine der Inseln und naschen uns auf der Obstplantage durch die frischen Köstlichkeiten des Landes: Mango, Rambutan, Longan. Abends sind wir zurück in unserer familiären Lodge und schwingen beim Mitkochen selbst den Löffel."
      },
      {
        day: 14, weekday: "Dienstag", date: "31.03.2026", city: "Mekongdelta – Saigon",
        meals: ["F"],
        text: "Vormittags Rückfahrt nach Ho Chi Minh City. Die 300 Jahre junge Multikulti-Metropole, auch bekannt unter ihrem alten Namen Saigon, gilt als Boomtown Vietnams. Die Kathedrale Notre-Dame, das alte Postamt, Trubel im chinesischen Viertel Cholon – Haare werden auf offener Straße geschnitten, es gibt mindestens 5000 Gewürze und Heilkräuter, Lackarbeiten, Jadekunst und Holzschnitte. Insidertipps verrät Ihr Scout, anschließend Ausgehtipps für den freien Abend. Übernachtung im Zentrum von Saigon."
      },
      {
        day: 15, weekday: "Mittwoch", date: "01.04.2026", city: "Saigon und Rückflug",
        meals: ["F", "A"],
        text: "Freizeit in Saigon oder Ausflug (55 €) zum Tunnelsystem von Cu Chi. Es diente dem Vietcong während des Vietnamkrieges als Unterschlupf – einige der Tunnel wurden extra für Touristen verbreitert, zum Glück! Gemeinsames Abschiedsessen und kurz vor Mitternacht Rückflug von Saigon nach Frankfurt (Flugdauer ca. 13 Std.)."
      }
    ];

    const MEAL_LABELS = { F: "🌅 Frühstück", M: "🍽️ Mittagessen", A: "🌙 Abendessen" };

    function parseProgramDate(dateStr) {
      const [d, m, y] = dateStr.split(".");
      return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
    }

    function getProgramStartIndex() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = 0; i < PROGRAM.length; i++) {
        const d = parseProgramDate(PROGRAM[i].date);
        if (d >= today) return i;
      }
      return PROGRAM.length - 1;
    }

    function ProgramCarousel() {
      const [idx, setIdx] = useState(() => getProgramStartIndex());
      const entry = PROGRAM[idx];

      return (
        <div style={{background:"#f4f5f7",borderRadius:20,padding:"20px",boxShadow:"0 8px 32px rgba(0,0,0,.18)",marginBottom:16,border:"1px solid #e2e3e8"}}>
          <div style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>🗺️ Tagesprogramm</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button
              onClick={() => setIdx(i => Math.max(0, i - 1))}
              disabled={idx === 0}
              style={{flexShrink:0,background:idx===0?"#f0f0f0":"linear-gradient(135deg,#c8102e,#e03535)",color:idx===0?"#bbb":"#fff",border:"none",borderRadius:10,width:36,height:36,fontSize:18,cursor:idx===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              ‹
            </button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:700,color:"#c8102e"}}>Tag {entry.day}</span>
                <span style={{fontSize:13,color:"#555",fontWeight:600}}>{entry.weekday}, {entry.date}</span>
              </div>
              <div style={{fontSize:15,fontWeight:700,color:"#1a1a1a",marginBottom:8}}>{entry.city}</div>
              <p style={{fontSize:12,color:"#555",lineHeight:1.6,margin:"0 0 10px 0"}}>{entry.text}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {entry.meals.map(m => (
                  <span key={m} style={{background:"#fff9e6",border:"1.5px solid #ffcd00",borderRadius:7,padding:"3px 10px",fontSize:11,fontWeight:600,color:"#b8860b"}}>
                    {MEAL_LABELS[m]}
                  </span>
                ))}
              </div>
            </div>
            <button
              onClick={() => setIdx(i => Math.min(PROGRAM.length - 1, i + 1))}
              disabled={idx === PROGRAM.length - 1}
              style={{flexShrink:0,background:idx===PROGRAM.length-1?"#f0f0f0":"linear-gradient(135deg,#c8102e,#e03535)",color:idx===PROGRAM.length-1?"#bbb":"#fff",border:"none",borderRadius:10,width:36,height:36,fontSize:18,cursor:idx===PROGRAM.length-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              ›
            </button>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:14}}>
            {PROGRAM.map((_, i) => (
              <button key={i} onClick={() => setIdx(i)}
                style={{width:i===idx?20:8,height:8,borderRadius:4,border:"none",background:i===idx?"#c8102e":"#ddd",cursor:"pointer",padding:0,transition:"width .2s"}}/>
            ))}
          </div>
        </div>
      );
    }

    const HOTELS = {
      "19.03.2026": { name: "Milalux Cruise", phone: null,                  web: "https://www.milacruises.com/",    city: "Halongbucht", address: null },
      "20.03.2026": { name: "Milalux Cruise", phone: null,                  web: "https://www.milacruises.com/",    city: "Halongbucht", address: null },
      "21.03.2026": { name: "Sunline",         phone: "0084 24 3934 1818",   web: null,                              city: "Hanoi",       address: "18 Ngo Bao Khanh" },
      "22.03.2026": { name: "Sunline",         phone: "0084 24 3934 1818",   web: null,                              city: "Hanoi",       address: "18 Ngo Bao Khanh" },
      "23.03.2026": { name: "Bakhan Village Resort", phone: "0084 888 68 3300", web: "https://www.bakhanvillage.co", city: "Mai Chau",    address: "01 Khan Ha" },
      "24.03.2026": { name: "Bakhan Village Resort", phone: "0084 888 68 3300", web: "https://www.bakhanvillage.co", city: "Mai Chau",    address: "01 Khan Ha" },
      "25.03.2026": { name: "Rose Garden",     phone: "0084-510-3924-111",   web: null,                              city: "Hoi An",      address: "23 Nguyen Hien, Tan An" },
      "26.03.2026": { name: "Rose Garden",     phone: "0084-510-3924-111",   web: null,                              city: "Hoi An",      address: "23 Nguyen Hien, Tan An" },
      "27.03.2026": { name: "Rosaleen Boutique", phone: "0084 234 3946 555", web: null,                              city: "Hue",         address: "36 Chu Van An" },
      "28.03.2026": { name: "Rosaleen Boutique", phone: "0084 234 3946 555", web: null,                              city: "Hue",         address: "36 Chu Van An" },
      "29.03.2026": { name: "Mekong Lodge",    phone: null,                  web: null,                              city: "Cai Be",      address: null },
      "30.03.2026": { name: "Mekong Lodge",    phone: null,                  web: null,                              city: "Cai Be",      address: null },
      "31.03.2026": { name: "Acnos Hotel",     phone: "0084 28 3925 2090",   web: "https://www.acnoshotel.com",      city: "Saigon",      address: "18–20 Nguyen Thi Nghia" },
    };

    function getTodayKey() {
      const now = new Date();
      const d = String(now.getDate()).padStart(2, "0");
      const m = String(now.getMonth() + 1).padStart(2, "0");
      return `${d}.${m}.${now.getFullYear()}`;
    }

    function getMapsUrl(hotel) {
      const query = [hotel.name, hotel.address, hotel.city].filter(Boolean).join(" ");
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    }

    const HOTEL_LIST = Object.entries(HOTELS)
      .map(([date, hotel]) => ({ date, ...hotel }))
      .sort((a, b) => parseProgramDate(a.date) - parseProgramDate(b.date));

    function getHotelStartIndex() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = 0; i < HOTEL_LIST.length; i++) {
        if (parseProgramDate(HOTEL_LIST[i].date) >= today) return i;
      }
      return HOTEL_LIST.length - 1;
    }

    function HotelCarousel() {
      const [idx, setIdx] = useState(() => getHotelStartIndex());
      const entry = HOTEL_LIST[idx];
      const mapsUrl = getMapsUrl(entry);
      return (
        <div style={{background:"#f4f5f7",borderRadius:20,padding:"20px",boxShadow:"0 8px 32px rgba(0,0,0,.18)",marginBottom:16,border:"1px solid #e2e3e8"}}>
          <div style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>🏨 Hotel</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button
              onClick={() => setIdx(i => Math.max(0, i - 1))}
              disabled={idx === 0}
              style={{flexShrink:0,background:idx===0?"#f0f0f0":"linear-gradient(135deg,#c8102e,#e03535)",color:idx===0?"#bbb":"#fff",border:"none",borderRadius:10,width:36,height:36,fontSize:18,cursor:idx===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              ‹
            </button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#c8102e",marginBottom:4}}>{entry.date}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:17,fontWeight:700,color:"#1a1a1a",marginBottom:2}}>{entry.name}</div>
                  <div style={{fontSize:13,color:"#555"}}>{entry.city}{entry.address ? ` · ${entry.address}` : ""}</div>
                  {entry.phone && <div style={{fontSize:12,color:"#666",marginTop:6}}>📞 <a href={`tel:${entry.phone}`} style={{color:"#555",textDecoration:"none"}}>{entry.phone}</a></div>}
                  {entry.web && <div style={{fontSize:12,marginTop:4}}>🌐 <a href={entry.web} target="_blank" rel="noopener noreferrer" style={{color:"#c8102e",textDecoration:"none"}}>{entry.web.replace(/^https?:\/\//,"")}</a></div>}
                </div>
                <a href={mapsUrl} target="_blank" rel="noopener noreferrer"
                  style={{flexShrink:0,background:"linear-gradient(135deg,#c8102e,#e03535)",color:"#fff",borderRadius:10,padding:"10px 14px",fontSize:12,fontWeight:700,textDecoration:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span style={{fontSize:18}}>📍</span>
                  <span>Maps</span>
                </a>
              </div>
            </div>
            <button
              onClick={() => setIdx(i => Math.min(HOTEL_LIST.length - 1, i + 1))}
              disabled={idx === HOTEL_LIST.length - 1}
              style={{flexShrink:0,background:idx===HOTEL_LIST.length-1?"#f0f0f0":"linear-gradient(135deg,#c8102e,#e03535)",color:idx===HOTEL_LIST.length-1?"#bbb":"#fff",border:"none",borderRadius:10,width:36,height:36,fontSize:18,cursor:idx===HOTEL_LIST.length-1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>
              ›
            </button>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:14}}>
            {HOTEL_LIST.map((_, i) => (
              <button key={i} onClick={() => setIdx(i)}
                style={{width:i===idx?20:8,height:8,borderRadius:4,border:"none",background:i===idx?"#c8102e":"#ddd",cursor:"pointer",padding:0,transition:"width .2s"}}/>
            ))}
          </div>
        </div>
      );
    }

    const FALLBACK_RATE = 1/30500;
    const RATE_KEY = "vnd_eur_rate";
    const RATE_DATE_KEY = "vnd_eur_rate_date";

    function App() {
      const [input, setInput] = useState("");
      const [rate, setRate]   = useState(null);
      const [rateSource, setRateSource] = useState("loading"); // "live" | "cached" | "fallback"
      const [rateDate, setRateDate]     = useState("");
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const storedRate = localStorage.getItem(RATE_KEY);
        const storedDate = localStorage.getItem(RATE_DATE_KEY) || "";
        if (storedRate) {
          setRate(parseFloat(storedRate));
          setRateDate(storedDate);
          setRateSource("cached");
          setLoading(false);
        }

        fetch("https://api.frankfurter.app/latest?from=VND&to=EUR")
          .then(r => r.json())
          .then(d => {
            const freshRate = d.rates.EUR;
            const today = new Date().toLocaleDateString("de-DE");
            localStorage.setItem(RATE_KEY, freshRate);
            localStorage.setItem(RATE_DATE_KEY, today);
            setRate(freshRate);
            setRateDate(today);
            setRateSource("live");
            setLoading(false);
          })
          .catch(() => {
            if (!storedRate) {
              setRate(FALLBACK_RATE);
              setRateSource("fallback");
            }
            setLoading(false);
          });
      }, []);

      const vnd = parseFloat(input.replace(/\./g,"").replace(",",".")) || 0;
      const eur = rate ? vnd * rate : 0;
      const tips = getTips(vnd);

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#da2020,#c8102e 40%,#ffcd00)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"24px 16px",fontFamily:"'Segoe UI',sans-serif"}}>
          <div style={{width:"100%",maxWidth:460}}>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:40}}>🇻🇳</div>
              <h1 style={{color:"#fff",margin:"8px 0 4px",fontSize:22,fontWeight:700,textShadow:"0 1px 4px rgba(0,0,0,.3)"}}>Marco Polo Vietnam Tour</h1>
            </div>

            <HotelCarousel />
            <ProgramCarousel />

            <div style={{background:"#fff",borderRadius:20,padding:"24px 20px",boxShadow:"0 8px 32px rgba(0,0,0,.18)"}}>
              <label style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:1,textTransform:"uppercase"}}>Betrag in Vietnamesischen Dong</label>
              <div style={{position:"relative",marginTop:8,marginBottom:20}}>
                <input type="number" min="0" value={input} onChange={e => setInput(e.target.value)}
                  placeholder="z. B. 250000"
                  style={{width:"100%",padding:"14px 48px 14px 16px",fontSize:22,fontWeight:700,border:"2px solid #e0e0e0",borderRadius:12,outline:"none",boxSizing:"border-box",color:"#1a1a1a"}}/>
                <span style={{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)",fontSize:20,color:"#aaa"}}>₫</span>
              </div>

              <div style={{background:"linear-gradient(135deg,#c8102e,#e03535)",borderRadius:14,padding:"16px 20px",textAlign:"center",marginBottom:12,color:"#fff"}}>
                <div style={{fontSize:12,opacity:.8,marginBottom:4}}>Entspricht ungefähr</div>
                <div style={{fontSize:32,fontWeight:800}}>{vnd > 0 ? fEUR(eur) : "—"}</div>
              </div>
              <div style={{textAlign:"center",fontSize:11,color:"#aaa",marginBottom:16}}>
                {loading ? "Lade Wechselkurs…"
                : rateSource === "live"     ? `Aktueller Kurs: 1 € ≈ ${new Intl.NumberFormat("de-DE").format(Math.round(1/rate))} ₫`
                : rateSource === "cached"   ? `Gespeicherter Kurs: 1 € ≈ ${new Intl.NumberFormat("de-DE").format(Math.round(1/rate))} ₫ (${rateDate || "unbekannt"})`
                : `⚠️ Fallback-Kurs (~30.500 ₫ / €)`}
              </div>

              {vnd > 0 && (<>
                <div style={{fontSize:12,fontWeight:600,color:"#888",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>💡 Trinkgeld-Vorschläge</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {tips.map((tip, i) => (
                    <div key={i} style={{background:"#fafafa",border:"2px solid #efefef",borderRadius:12,padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                            <span style={{fontSize:15}}>{LABELS[i].icon}</span>
                            <span style={{fontWeight:700,color:"#222",fontSize:14}}>{LABELS[i].label}</span>
                            <span style={{fontSize:11,color:"#aaa"}}>(+{fVND(tip-vnd)})</span>
                          </div>
                          <div style={{fontSize:11,color:"#888",paddingLeft:22}}>{LABELS[i].when}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontWeight:700,color:"#c8102e",fontSize:15}}>{fVND(tip)}</div>
                          <div style={{fontSize:11,color:"#aaa"}}>{fEUR(tip*rate)}</div>
                        </div>
                      </div>
                      <div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed #e8e8e8",display:"flex",flexWrap:"wrap",gap:6}}>
                        {getBills(tip).map(({n,c}) => (
                          <div key={n} style={{background:"#fff9e6",border:"1.5px solid #ffcd00",borderRadius:7,padding:"4px 10px",fontSize:12,fontWeight:600,color:"#555",display:"flex",gap:3}}>
                            <span style={{color:"#b8860b"}}>{c}×</span><span>{fVND(n)}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </>)}
            </div>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:11,textAlign:"center",marginTop:14}}>Wechselkurs via frankfurter.app · Trinkgeld ist in Vietnam freiwillig, aber willkommen 🙏</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>

</body>
</html>
